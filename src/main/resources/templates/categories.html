<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <div th:replace="cabecalho :: head"></div>
    <title>Crud Manager - Categorias</title>
</head>
<body>
    <div th:replace="cabecalho :: navbar"></div>
    <div class="container my-2">
        <h1>Categorias</h1>
        <div>
            <a class="btn btn-primary btn-sm mb-3 float-right"
               th:href="@{/categories/form}">
                Adicionar Categoria
            </a>
        </div>
        <table class="table table-striped table-responsive-md">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Código</th>
                    <th>Setor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cat : ${categorias}">
                    <td th:text="${cat.name}"></td>
                    <td th:text="${cat.description}"></td>
                    <td th:text="${cat.code}"></td>
                    <td th:text="${cat.sector}"></td>
                    <td>
                        <a class="btn btn-primary"
                           th:href="@{/categories/{id}(id=${cat.id})}">
                            Alterar
                        </a>
                        <a class="btn btn-danger"
                           th:href="@{/categories/delete/{id}(id=${cat.id})}">
                            Excluir
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
