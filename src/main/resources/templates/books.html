<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
	<head>
		<div th:replace="cabecalho :: head"></div>
		
		<title>Crud Manager - Livros</title>
	</head>
	<body>
		<div th:replace="cabecalho :: navbar"></div>
		<div class="container my-2">
			<h1>Livros</h1>
			<div>				
				<a class="btn btn-primary btn-sm mb-3 float-right"
				   th:href="@{/books/form}">
		   			Adicionar Livro
        		</a>
			</div>
			<table class="table table-striped table-responsive-md">
				<thead>
					<tr>
						<th>Título</th>
						<th>Autor</th>
						<th>Ano de Publicação</th>
						<th>Categoria</th>
						<th>Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="book : ${livros}">
						<td th:text="${book.title}"></td>
						<td th:text="${book.author.name}"></td>
						<td th:text="${book.publishYear}"></td>
						<td th:text="${book.category.name}"></td>
						<td>
							<a class="btn btn-primary"
							   th:href="@{/books/{id}(id=${book.id})}">
								Alterar
							</a>
							
							<a class="btn btn-danger"
							   th:href="@{/books/delete/{id}(id=${book.id})}">
								Excluir
							</a>			
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</body>
</html>
