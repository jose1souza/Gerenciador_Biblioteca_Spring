<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{cabecalho :: head}"></div>
    <title>Sistema de Biblioteca</title>
</head>

<body class="bg-light">

    <div th:replace="~{cabecalho :: navbar}"></div>

    <div class="container my-5 text-center">
        
        <h1 class="font-weight-bold text-primary mb-3">Sistema de Biblioteca</h1>
        <p class="text-muted mb-5">Selecione um dos módulos para gerenciar o sistema:</p>

        <div class="row justify-content-center">
            <div class="col-sm-4 col-md-3 mb-3">
                <a th:href="@{/users}" class="btn btn-outline-primary btn-block btn-lg p-3 shadow-sm">
                     Leitores
                </a>
            </div>
            <div class="col-sm-4 col-md-3 mb-3">
                <a th:href="@{/books}" class="btn btn-outline-success btn-block btn-lg p-3 shadow-sm">
                     Livros
                </a>
            </div>
            <div class="col-sm-4 col-md-3 mb-3">
                <a th:href="@{/categories}" class="btn btn-outline-warning btn-block btn-lg p-3 shadow-sm">
                     Categorias
                </a>
            </div>
        </div>
        
    </div>

    <footer class="text-center text-muted fixed-bottom py-3 bg-white border-top">
        <p class="mb-0 small">&copy; 2026 CRUD Manager. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
